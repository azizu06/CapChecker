name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect application scaffold
        id: app
        shell: bash
        run: |
          if [[ -f package.json ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "No package.json yet. Application checks will begin after scaffold issue lands."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.app.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Require lockfile and scripts
        if: steps.app.outputs.exists == 'true'
        shell: bash
        run: |
          test -f package-lock.json
          node -e 'const p=require("./package.json"); for (const s of ["lint","typecheck","test:unit","test:e2e","build"]) if (!p.scripts?.[s]) throw new Error(`Missing script: ${s}`)'

      - name: Install dependencies
        if: steps.app.outputs.exists == 'true'
        run: npm ci

      - name: Lint
        if: steps.app.outputs.exists == 'true'
        run: npm run lint

      - name: Typecheck
        if: steps.app.outputs.exists == 'true'
        run: npm run typecheck

      - name: Unit and component tests
        if: steps.app.outputs.exists == 'true'
        run: npm run test:unit

      - name: Build
        if: steps.app.outputs.exists == 'true'
        run: npm run build

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect application scaffold
        id: app
        shell: bash
        run: |
          if [[ -f package.json ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "No package.json yet. Playwright checks will begin after scaffold issue lands."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.app.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Require lockfile and E2E script
        if: steps.app.outputs.exists == 'true'
        shell: bash
        run: |
          test -f package-lock.json
          node -e 'const p=require("./package.json"); if (!p.scripts?.["test:e2e"]) throw new Error("Missing script: test:e2e")'

      - name: Install dependencies
        if: steps.app.outputs.exists == 'true'
        run: npm ci

      - name: Install Chromium
        if: steps.app.outputs.exists == 'true'
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E
        if: steps.app.outputs.exists == 'true'
        run: npm run test:e2e

      - name: Upload Playwright failure artifacts
        if: failure() && steps.app.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 3
